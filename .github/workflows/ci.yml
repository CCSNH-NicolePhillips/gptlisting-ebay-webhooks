name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Type checking ──────────────────────────────────────────────────────
      - name: Typecheck (main)
        run: npm run typecheck

      - name: Typecheck (tests)
        run: npm run typecheck:test

      # ── Lint ───────────────────────────────────────────────────────────────
      - name: Lint (all files)
        run: npm run lint

      - name: Lint (layer boundaries)
        run: npm run lint:boundaries

      # ── Structural guards (Node/tsx — runs on all platforms) ────────────────
      - name: Guard - no Netlify imports in apps/ or packages/
        run: npm run check:no-netlify

      - name: Guard - every Netlify function in migration inventory
        run: npm run check:inventory

      - name: Guard - src/lib/ frozen (no new files)
        run: npm run check:structure

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: npx jest --ci
        env:
          NODE_ENV: test

